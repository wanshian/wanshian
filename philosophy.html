<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業理念 | 萬象機械工程有限公司</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<link rel="icon" href="images/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="images/favicon.png">
    <script>
        if (sessionStorage.getItem("hasSeenLoader")) {
            document.documentElement.classList.add('no-loader');
        }
    </script>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div id="header-placeholder"></div>

    <header class="hero-gradient text-white py-20 text-center">
        <h1 class="text-4xl font-bold mb-4">企業理念</h1>
        <p class="text-slate-400">態度 · 專業 · 責任 — 萬象機械的核心基石</p>
    </header>

    <section class="py-24 max-w-7xl mx-auto px-6">
        <div class="space-y-24">
            <div class="flex flex-col md:flex-row items-center gap-12 group">
                <div class="md:w-1/2">
                    <span class="text-6xl font-black text-blue-100 block mb-4 italic">01. ATTITUDE</span>
                    <h2 class="text-4xl font-bold text-blue-900 mb-6">態度</h2>
                    <p class="text-slate-600 leading-relaxed text-lg">萬象機械相信「態度決定高度」。在嚴苛的工程現場，我們始終保持正向思考與高度的自律。</p>
                </div>
                <div class="md:w-1/2 h-80 rounded-3xl overflow-hidden shadow-xl hover-zoom">
                    <img src="images/attitude.jpg" alt="工作態度" class="w-full h-full object-cover" loading="lazy">
                </div>
            </div>

            <div class="flex flex-col md:flex-row-reverse items-center gap-12 group">
                <div class="md:w-1/2">
                    <span class="text-6xl font-black text-blue-100 block mb-4 italic">02. PROFESSIONALISM</span>
                    <h2 class="text-4xl font-bold text-blue-900 mb-6">專業</h2>
                    <p class="text-slate-600 leading-relaxed text-lg">三十年的實務經驗，不只是數字的累積，更是技術的淬鍊。確保每一次排洪任務萬無一失。</p>
                </div>
                <div class="md:w-1/2 h-80 rounded-3xl overflow-hidden shadow-xl hover-zoom">
                    <img src="images/professional.jpg" alt="專業工程技術" class="w-full h-full object-cover" loading="lazy">
                </div>
            </div>

            <div class="flex flex-col md:flex-row items-center gap-12 group">
                <div class="md:w-1/2">
                    <span class="text-6xl font-black text-blue-100 block mb-4 italic">03. RESPONSIBILITY</span>
                    <h2 class="text-4xl font-bold text-blue-900 mb-6">責任</h2>
                    <p class="text-slate-600 leading-relaxed text-lg">公共工程關乎市民生命財產安全。我們對每一台機組、每一扇水閘門，都視如己出地守護。</p>
                </div>
                <div class="md:w-1/2 h-80 rounded-3xl overflow-hidden shadow-xl hover-zoom">
                    <img src="images/responsibility.jpg" alt="守護排洪安全" class="w-full h-full object-cover" loading="lazy">
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="components.js"></script>
</body>
<div id="preloader">
    <img src="images/favicon.png" class="w-20 h-20 logo-pulse" alt="Loading...">
</div>
<script>
    if (sessionStorage.getItem('hasSeenPreloader')) {
        document.getElementById('preloader').style.display = 'none';
    }
</script>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        const loader = document.getElementById("loader-wrapper");
        
        // 檢查瀏覽器內部的「快閃記憶體」，看看這回合是否看過動畫
        if (sessionStorage.getItem("hasSeenLoader")) {
            // 如果看過了，直接移除動畫層，不留痕跡
            loader.style.display = "none";
        } else {
            // 如果是第一次進站，等網頁載入完畢後執行動畫
            window.addEventListener("load", function() {
                setTimeout(() => {
                    loader.classList.add("loader-hidden");
                    // 標記「已經看過了」，直到關閉瀏覽器分頁為止
                    sessionStorage.setItem("hasSeenLoader", "true");
                }, 1500);
            });
        }
    });
</script>
</html>
